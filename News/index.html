<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="../images/icon/logo.png">
    <title>Hexoria – News</title>

    <link rel="stylesheet" href="../styles.css">
</head>
<body>

<header id="header"></header>
<script src="../header.js"></script>

<section id="news" class="container">
    <div id="news-popup">
        <div class="popup-content">
            <span id="popup-close">×</span>

            <img id="popup-image" class="popup-image">
            <h2 id="popup-title"></h2>

            <p class="small muted">
                <span id="popup-category"></span> • <span id="popup-date"></span>
            </p>

            <div id="popup-body"></div>
        </div>
    </div>

    <div class="news-filters">
        <button class="filter-btn active" data-filter="all">Alle</button>
        <button class="filter-btn" data-filter="Event">Events</button>
        <button class="filter-btn" data-filter="Update">Updates</button>
        <button class="filter-btn" data-filter="Devblog">Devblogs</button>
    </div>

    <div id="news-list" class="news-grid"></div>
</section>

<footer id="footer"></footer>
<script src="../footer.js"></script>

<script src="../news.js"></script>

<script>
  // Markiere aktiven Nav-Link
  const currentPage = window.location.pathname.split("/").pop();
  document.querySelectorAll(".nav-link").forEach(link => {
    if (link.getAttribute("href") === currentPage || link.textContent.trim().toLowerCase() === 'news') {
      link.classList.add("active");
    }
  });
</script>

</body>
</html>
