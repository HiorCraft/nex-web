<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="images/logo.png">
    <title>Hexoria – News</title>

    <link rel="stylesheet" href="styles.css">
    <script src="header.js" defer></script>
</head>
<body>

<header id="header"></header>


<section id="news" class="container">
    <div class="heading-box">
        <h1 class="section__title">News & Updates</h1>
        <p class="small muted">Alle Neuigkeiten rund um Craftunity.</p>
    </div>

    <div class="news-filters">
        <button class="filter-btn active" data-filter="all">Alle</button>
        <button class="filter-btn" data-filter="Event">Events</button>
        <button class="filter-btn" data-filter="Update">Updates</button>
        <button class="filter-btn" data-filter="Devblog">Devblogs</button>
    </div>

    <div id="news-list" class="news-grid"></div>
</section>

<div id="news-popup" class="news-popup">
    <div class="news-popup-content">
        <span class="popup-close">×</span>
        <div id="popup-inner"></div>
    </div>
</div>

<footer id="footer"></footer>
<script src="footer.js" defer></script>
<script src="news.js" defer></script>


<script>
    const currentPage = window.location.pathname.split("/").pop();
    document.querySelectorAll(".nav-link").forEach(link => {
        if (link.getAttribute("href") === currentPage) {
            link.classList.add("active");
        }
    });
</script>
<script src="news.js"></script>
</body>
</html>
